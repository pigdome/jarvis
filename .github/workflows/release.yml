name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v0.16.0

jobs:
  release:
    name: Build & Release for Linux (Universal Compatibility)
    runs-on: ubuntu-22.04 # Ubuntu 22.04 (Jammy) is the current stable Ubuntu LTS and will be compatible with modern stable OSs like Debian 12.
    permissions:
      contents: write # Needed to create releases

    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 🚀 Build Executable with PyInstaller
        run: |
          pyinstaller --onefile \
            --name jarvis \
            --add-data "config:config" \
            --add-data "config/.vimrc:config" \
            --add-data "config/authorized_keys:config" \
            --add-data "module:module" \
            --add-data "lib:lib" \
            --clean \
            src/jarvis/main.py

      - name: 📦 Compress Binary
        run: |
          # Create zip and tar.gz of the single binary
          cd dist
          zip jarvis.zip jarvis
          tar -czvf jarvis.tar.gz jarvis

      - name: ✨ Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/jarvis.zip
            dist/jarvis.tar.gz
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
